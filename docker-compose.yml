services:
  app:
    image: ghcr.io/alexandervilla47/pomodoro:latest
    restart: unless-stopped
    environment:
      - PORT=4000
      - DB_PATH=/data/pomodoro.db
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./data:/data
    networks:
      - pomodoro-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - pomodoro-net

networks:
  pomodoro-net:
    driver: bridge
