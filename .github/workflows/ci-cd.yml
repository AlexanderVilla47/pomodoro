name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Correr tests
        run: npx vitest run

  # ─────────────────────────────────────────
  # JOB 2: Build y push a Docker Hub
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pomodoro:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pomodoro:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy en Oracle Cloud
  # ─────────────────────────────────────────
  deploy:
    name: Deploy a Oracle Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pomodoro:latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE
          script: |
            # Bajar lo que esté corriendo en el puerto 80
            cd /opt/pomodoro && docker compose down 2>/dev/null || true
            docker stop pomodoro 2>/dev/null || true
            docker rm   pomodoro 2>/dev/null || true

            # Traer imagen nueva
            docker pull "$IMAGE"

            # Levantar
            mkdir -p /opt/pomodoro/data
            docker run -d \
              -p 80:4000 \
              --name pomodoro \
              --restart unless-stopped \
              -v /opt/pomodoro/data:/data \
              -e PORT=4000 \
              -e DB_PATH=/data/pomodoro.db \
              -e YOUTUBE_API_KEY="$(grep -m1 YOUTUBE_API_KEY /opt/pomodoro/.env | cut -d'=' -f2-)" \
              "$IMAGE"

            docker image prune -f
