name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests (corre en PRs y en main)
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Correr tests
        run: npx vitest run

  # ─────────────────────────────────────────
  # JOB 2: Deploy en Oracle Cloud via SSH
  # Buildea la imagen directamente en el server ARM (nativo, sin QEMU)
  # Solo en push a main (no en PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy a Oracle Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Build y deploy en el server ARM
        uses: appleboy/ssh-action@v1
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REPO_URL,COMMIT_SHA
          command_timeout: 20m
          script: |
            cd /opt/pomodoro

            # Sync código (primera vez: init, siguientes: pull)
            if [ ! -d ".git" ]; then
              git init
              git remote add origin "$REPO_URL"
            fi
            git fetch origin main --depth=1
            git reset --hard FETCH_HEAD

            # Build nativo en ARM (sin QEMU, rápido)
            docker build -t pomodoro:latest .

            # Reiniciar con la nueva imagen
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Deploy OK — commit $COMMIT_SHA"
