name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests (corre en PRs y en main)
  # ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Correr tests
        run: npx vitest run

  # ─────────────────────────────────────────
  # JOB 2: Deploy en Oracle Cloud via SSH
  # Buildea la imagen directamente en el server ARM (nativo, sin QEMU)
  # Solo en push a main (no en PRs)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy a Oracle Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Build y deploy en el server ARM
        uses: appleboy/ssh-action@v1
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_PATH: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GIT_TOKEN,REPO_PATH,COMMIT_SHA
          command_timeout: 20m
          script: |
            SRC=/opt/pomodoro-src
            CLONE_URL="https://x-access-token:${GIT_TOKEN}@github.com/${REPO_PATH}.git"

            # Sync código (primera vez: clone, siguientes: pull)
            if [ -d "$SRC/.git" ]; then
              cd "$SRC"
              git fetch origin main --depth=1
              git reset --hard FETCH_HEAD
            else
              rm -rf "$SRC"
              git clone --depth=1 "$CLONE_URL" "$SRC"
            fi

            # Build nativo en ARM (sin QEMU, ~3 min)
            docker build -t pomodoro:latest "$SRC"

            # Actualizar compose/nginx y reiniciar
            cp "$SRC/docker-compose.yml" /opt/pomodoro/
            cp "$SRC/nginx.conf" /opt/pomodoro/
            cd /opt/pomodoro
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f

            echo "Deploy OK — $COMMIT_SHA"
